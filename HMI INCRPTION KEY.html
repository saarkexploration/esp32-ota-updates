<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Generator Calculator</title>
    <style>
        /* Prevents users from highlighting or selecting text on the page by default */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #111;
            font-size: 24px;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        input:focus {
            border-color: #0066cc;
            outline: none;
        }
        .result-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
        }
        .final-output {
            font-size: 24px;
            font-weight: 700;
            color: #0066cc;
            /* Allows ONLY the output key number to be selectable and copied */
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        .error {
            color: #de3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ENTER HMI ENCRIPTION KEY</h2>
    
    <div class="form-group">
        <label for="inputValue">Enter Value:</label>
        <input type="text" id="inputValue" value="26529" placeholder="e.g., 26529" autocomplete="off">
        <div id="errorMsg" class="error">Please enter a valid 5-digit number.</div>
    </div>

    <div class="result-box">
        <div class="final-output" id="outputKey">Output Key: --</div>
    </div>
</div>

<script>
    // --- 1. Security Scripts to Block Right-Click and Inspection Shortcuts ---
    
    // Disables Right-Click Menu
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // Disables F12, Ctrl+Shift+I, Ctrl+Shift+J, and Ctrl+U (View Source)
    document.addEventListener('keydown', function(e) {
        // Block F12
        if (e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
        // Block Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
            e.preventDefault();
            return false;
        }
        // Block Ctrl+U (View Source)
        if (e.ctrlKey && e.keyCode === 85) {
            e.preventDefault();
            return false;
        }
    });

    // --- 2. Calculation Logic ---
    const inputEl = document.getElementById('inputValue');
    const errorEl = document.getElementById('errorMsg');
    const outputEl = document.getElementById('outputKey');

    function calculateKey() {
        const val = inputEl.value.trim();
        
        if (!/^\d{5}$/.test(val)) {
            errorEl.style.display = 'block';
            outputEl.textContent = 'Output Key: --';
            return;
        }
        
        errorEl.style.display = 'none';

        const firstTwo = parseInt(val.substring(0, 2), 10);
        const lastThree = parseInt(val.substring(2, 5), 10);
        
        const total = (firstTwo * 3) + (lastThree * 2) + 9100;

        outputEl.textContent = `Output Key: ${total}`;
    }

    inputEl.addEventListener('input', calculateKey);
    calculateKey();
</script>

</body>
</html>
